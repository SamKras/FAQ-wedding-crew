// ─── State ───────────────────────────────────────────────────────────────────
let lang = 'ru';
let activeTab = 'all';

// ─── Render ──────────────────────────────────────────────────────────────────
function render() {
  const d = DATA[lang];
  const app = document.getElementById('app');

  const tabsHTML = d.tabs.map(t =>
    `<button class="tab-btn${activeTab === t.id ? ' active' : ''}" data-tab="${t.id}">${t.label}</button>`
  ).join('');

  const sectionsHTML = d.sections.map(sec => {
    const itemsHTML = sec.items.map((item, i) =>
      `<div class="faq-item" data-section="${sec.id}" data-idx="${i}">
        <button class="faq-question">
          <span>${item.q}</span>
          <span class="icon">+</span>
        </button>
        <div class="faq-answer">${item.a}</div>
      </div>`
    ).join('');

    const hidden = activeTab !== 'all' && activeTab !== sec.id ? ' hidden' : '';
    return `<div class="faq-section${hidden}" data-section="${sec.id}">
      <div class="section-title">${sec.title}</div>
      ${itemsHTML}
    </div>`;
  }).join('');

  app.innerHTML = `
    <div class="top-bar">
      <div>
        <h1>${d.title}</h1>
        <p>${d.subtitle}</p>
      </div>
      <div class="lang-toggle">
        <button class="lang-btn active" id="lang-ru">RU</button>
        <button class="lang-btn" id="lang-en">EN</button>
      </div>
    </div>
    <div class="search-wrapper">
      <input type="text" id="search" placeholder="${d.searchPlaceholder}" autocomplete="off" value="">
    </div>
    <div class="tabs">${tabsHTML}</div>
    ${sectionsHTML}
    <p class="no-results" id="no-results">${d.noResults}</p>
  `;

  // Highlight active lang button
  document.getElementById('lang-ru').classList.toggle('active', lang === 'ru');
  document.getElementById('lang-en').classList.toggle('active', lang === 'en');

  bindEvents();
}

// ─── Events ──────────────────────────────────────────────────────────────────
function bindEvents() {
  // Accordion
  document.querySelectorAll('.faq-question').forEach(btn => {
    btn.addEventListener('click', () => {
      const item = btn.closest('.faq-item');
      const isOpen = item.classList.contains('open');
      document.querySelectorAll('.faq-item.open').forEach(i => i.classList.remove('open'));
      if (!isOpen) item.classList.add('open');
    });
  });

  // Tabs
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      activeTab = btn.dataset.tab;
      document.getElementById('search').value = '';
      render();
    });
  });

  // Search
  document.getElementById('search').addEventListener('input', function () {
    const q = this.value.toLowerCase().trim();

    // Reset tab to all
    if (q) {
      activeTab = 'all';
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      const allBtn = document.querySelector('[data-tab="all"]');
      if (allBtn) allBtn.classList.add('active');
      document.querySelectorAll('.faq-section').forEach(s => s.classList.remove('hidden'));
    }

    let anyVisible = false;
    document.querySelectorAll('.faq-item').forEach(item => {
      const qText = item.querySelector('.faq-question').textContent.toLowerCase();
      const aText = item.querySelector('.faq-answer').textContent.toLowerCase();
      const match = !q || qText.includes(q) || aText.includes(q);
      item.classList.toggle('hidden', !match);
      if (match) anyVisible = true;
    });

    document.getElementById('no-results').style.display = (q && !anyVisible) ? 'block' : 'none';
  });

  // Language toggle
  document.getElementById('lang-ru').addEventListener('click', () => {
    if (lang !== 'ru') { lang = 'ru'; activeTab = 'all'; render(); }
  });
  document.getElementById('lang-en').addEventListener('click', () => {
    if (lang !== 'en') { lang = 'en'; activeTab = 'all'; render(); }
  });
}

render();
</script>
